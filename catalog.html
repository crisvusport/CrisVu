<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sản phẩm — CRIS VŨ</title>
<meta name="description" content="Toàn bộ áo bóng đá replica cao cấp tại CRIS VŨ. Tìm kiếm & lọc theo đội, mùa giải, mẫu áo, phiên bản.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <a class="brand" href="index.html"><b>CRIS<span>VŨ</span></b></a>
    <nav class="nav">
      <a href="index.html" data-i18n="nav.home">Trang chủ</a>
      <a href="catalog.html" class="active" data-i18n="nav.catalog">Sản phẩm</a>
      <a href="about.html" data-i18n="nav.about">Giới thiệu</a>
      <a class="lang" id="lang-btn" href="#">EN</a>
    </nav>
  </div>
</header>

<div class="controls">
  <label class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="search-input" type="search" data-i18n-ph="search.placeholder" placeholder="Tìm theo đội bóng, mùa giải...">
  </label>

  <nav class="tabs" aria-label="Danh mục">
    <button class="tab active" data-cat="all" data-i18n="cat.all">Tất cả</button>
    <button class="tab" data-cat="clb" data-i18n="cat.clb">CLB</button>
    <button class="tab" data-cat="doi-tuyen" data-i18n="cat.doi-tuyen">Đội tuyển</button>
    <button class="tab" data-cat="retro" data-i18n="cat.retro">Retro</button>
  </nav>

  <div class="team-row" id="team-row" aria-label="Đội bóng"></div>

  <button class="filter-toggle" id="filter-toggle">
    <span data-i18n="filter.title">Bộ lọc</span>
    <span class="count" id="filter-count" style="display:none">0</span>
  </button>

  <div class="filters" id="filters">
    <div class="fgroup"><h4 data-i18n="filter.loai">Loại</h4><div class="fopts" id="f-loai"></div></div>
    <div class="fgroup"><h4 data-i18n="filter.kit">Mẫu áo</h4><div class="fopts" id="f-kit"></div></div>
    <div class="fgroup"><h4 data-i18n="filter.version">Phiên bản</h4><div class="fopts" id="f-version"></div></div>
    <div class="fgroup"><h4 data-i18n="filter.special">Kiểu đặc biệt</h4><div class="fopts" id="f-special"></div></div>
    <div class="fgroup"><h4 data-i18n="filter.season">Mùa giải</h4>
      <input class="fselect" id="f-season-input" list="season-list" type="search"
             data-i18n-ph="filter.season.all" placeholder="Tất cả mùa" autocomplete="off">
      <datalist id="season-list"></datalist>
    </div>
    <div class="filters-foot">
      <span class="result-count" id="result-count"></span>
      <button class="clear-btn" id="clear-filters" data-i18n="filter.clear">Xoá lọc</button>
    </div>
  </div>
</div>

<section class="section" style="padding-top:22px">
  <div class="grid" id="grid"></div>
</section>

<footer class="ftr">
  <a class="brand" href="index.html"><b>CRIS<span>VŨ</span></b></a>
  <p data-i18n="footer.rights">Áo bóng đá replica cao cấp</p>
  <div class="ftr-links">
    <a id="fab-fb-2" href="#" target="_blank" rel="noopener">Facebook</a>
    <a id="fab-ig-2" href="#" target="_blank" rel="noopener">Instagram</a>
  </div>
</footer>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
  <div class="lb-gallery" id="lb-gallery"></div>
  <div class="lb-dots" id="lb-dots"></div>
  <div class="lb-info">
    <div class="lb-team" id="lb-team"></div>
    <div class="lb-name" id="lb-name"></div>
    <div class="lb-sizes-label" data-i18n="detail.sizes">Size có sẵn</div>
    <div class="lb-sizes" id="lb-sizes"></div>
    <p class="lb-swipe" data-i18n="detail.swipe">Vuốt để xem mặt trước / sau / chi tiết</p>
    <div class="lb-order-label" data-i18n="detail.order">Nhắn để hỏi giá & đặt hàng</div>
    <div class="lb-contacts">
      <a class="lb-contact" id="lbc-zalo" target="_blank" rel="noopener"><span class="d"></span><span data-i18n="contact.zalo">Zalo</span></a>
      <a class="lb-contact" id="lbc-phone"><span class="d"></span><span data-i18n="contact.phone">Gọi điện</span></a>
      <a class="lb-contact" id="lbc-fb" target="_blank" rel="noopener"><span class="d"></span>Facebook</a>
      <a class="lb-contact" id="lbc-ig" target="_blank" rel="noopener"><span class="d"></span>Instagram</a>
    </div>
  </div>
</div>

<div class="fab">
  <div class="fab-menu" id="fab-menu">
    <a class="fab-item" id="fab-zalo" target="_blank" rel="noopener"><span class="d"></span><span data-i18n="contact.zalo">Zalo</span></a>
    <a class="fab-item" id="fab-phone"><span class="d"></span><span data-i18n="contact.phone">Gọi điện</span></a>
    <a class="fab-item" id="fab-fb" target="_blank" rel="noopener"><span class="d"></span>Facebook</a>
    <a class="fab-item" id="fab-ig" target="_blank" rel="noopener"><span class="d"></span>Instagram</a>
  </div>
  <button class="fab-toggle" id="fab-toggle" aria-label="Liên hệ">✆</button>
</div>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/catalog.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    applyI18n();
    initLang();
    initFab();
    initLightbox();
    initLightboxContacts();
    document.getElementById("fab-fb-2").href = CONTACT.facebook;
    document.getElementById("fab-ig-2").href = CONTACT.instagram;
    await loadProducts();
    initCatalog();
  });
</script>
</body>
</html>
